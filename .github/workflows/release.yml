name: Release

on:
  push:
    tags:
      # major release: v1.0
      - 'v[0-9]+.[0-9]+'
      # patch release: v1.0.1
      - 'v[0-9]+.[0-9]+.[0-9]+'

jobs:
    build:
        strategy:
            matrix:
                include:
                    - os: ubuntu-latest
                      args: --linux
                    - os: windows-latest
                      args: --win

        runs-on: ${{ matrix.os }}

        env:
            FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

        steps:
            - uses: actions/checkout@v4

            - uses: actions/setup-node@v4
              with:
                  node-version: 22

            - name: Set version from tag
              shell: bash
              run: |
                  TAG="${{ github.ref_name }}"
                  VERSION="${TAG#v}"
                  npm version "$VERSION" --no-git-tag-version --allow-same-version

            - name: Cache electron
              uses: actions/cache@v4
              with:
                  path: |
                      ~/.cache/electron
                      ~/AppData/Local/electron/Cache
                  key: electron-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

            - name: Install dependencies
              run: npm ci

            - name: Install system dependencies (Linux)
              if: runner.os == 'Linux'
              run: sudo apt-get install -y libarchive-tools

            - name: Build
              run: npx electron-builder ${{ matrix.args }} --publish never

            - name: Upload artifacts
              uses: actions/upload-artifact@v4
              with:
                  name: release-${{ matrix.os }}
                  path: |
                      dist/*.AppImage
                      dist/*.deb
                      dist/*.rpm
                      dist/*.pkg.tar.zst
                      dist/*.exe
                  if-no-files-found: error

    release:
        needs: build
        runs-on: ubuntu-latest

        permissions:
            contents: write

        # Determine release type from tag shape
        # v1.0   → major (make_latest=true,  prerelease=false)
        # v1.0.1 → patch (make_latest=false, prerelease=true)
        steps:
            - name: Determine release type
              id: type
              run: |
                  TAG="${{ github.ref_name }}"
                  if [[ "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
                    echo "prerelease=true"  >> "$GITHUB_OUTPUT"
                    echo "make_latest=false" >> "$GITHUB_OUTPUT"
                    echo "label=Patch release" >> "$GITHUB_OUTPUT"
                  else
                    echo "prerelease=false" >> "$GITHUB_OUTPUT"
                    echo "make_latest=true"  >> "$GITHUB_OUTPUT"
                    echo "label=Major release" >> "$GITHUB_OUTPUT"
                  fi

            - name: Download all artifacts
              uses: actions/download-artifact@v4
              with:
                  path: dist
                  merge-multiple: true

            - name: Create GitHub Release
              uses: softprops/action-gh-release@v2
              with:
                  files: dist/**
                  generate_release_notes: true
                  prerelease: ${{ steps.type.outputs.prerelease }}
                  make_latest: ${{ steps.type.outputs.make_latest }}
                  name: "ABS2Kindle ${{ github.ref_name }} (${{ steps.type.outputs.label }})"
