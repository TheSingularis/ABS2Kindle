app-id: com.abs2kindle.ABS2Kindle
runtime: org.freedesktop.Platform
runtime-version: '24.08'
sdk: org.freedesktop.Sdk
base: org.electronjs.Electron2.BaseApp
base-version: '24.08'
sdk-extensions:
  - org.freedesktop.Sdk.Extension.node22
command: abs2kindle

finish-args:
  # Wayland + X11 display
  - --socket=wayland
  - --socket=fallback-x11
  - --share=ipc
  # Audio (for any future media playback)
  - --socket=pulseaudio
  # Network access — required to reach ABS server
  - --share=network
  # USB / MTP device access
  - --device=all
  # D-Bus session (kmtpd, GVFS)
  - --socket=session-bus
  # Home dir read — needed to detect GVFS FUSE mounts under /run/user
  - --filesystem=home:ro
  # /run/user for GVFS mount detection
  - --filesystem=/run/user

build-options:
  append-path: /usr/lib/sdk/node22/bin
  env:
    NPM_CONFIG_LOGLEVEL: info
    ELECTRON_SKIP_BINARY_DOWNLOAD: '1'

modules:
  - name: abs2kindle
    buildsystem: simple
    build-commands:
      # Install node_modules offline (cache pre-populated by flatpak-node-generator)
      - npm install --offline
      # Copy app source into /app
      - install -Dm755 build/abs2kindle.sh /app/bin/abs2kindle
      - install -d /app/lib/abs2kindle
      - cp -r src node_modules package.json /app/lib/abs2kindle/
      # Desktop entry + icon
      - install -Dm644 build/flatpak/com.abs2kindle.ABS2Kindle.desktop
          /app/share/applications/com.abs2kindle.ABS2Kindle.desktop
      - install -Dm644 build/flatpak/com.abs2kindle.ABS2Kindle.png
          /app/share/icons/hicolor/256x256/apps/com.abs2kindle.ABS2Kindle.png
      - install -Dm644 build/flatpak/com.abs2kindle.ABS2Kindle.metainfo.xml
          /app/share/metainfo/com.abs2kindle.ABS2Kindle.metainfo.xml
    sources:
      - type: git
        url: https://github.com/TheSingularis/ABS2Kindle.git
        branch: dev
      # Generated by: flatpak-node-generator npm package-lock.json
      # Run: flatpak-node-generator npm package-lock.json -o build/flatpak/generated-sources.json
      - generated-sources.json
